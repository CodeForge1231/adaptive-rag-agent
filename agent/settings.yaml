providers:
  embeddings:
    embeddings_openai_base: &emb_openai
      provider: openai
      model: ${OPENAI_EMBEDDING_MODEL}

    embeddings_ollama_base: &emb_ollama
      provider: ollama
      model: ${OLLAMA_EMBEDDING_MODEL}

    huggingface: &emb_hf
      provider: huggingface
      model: ${HF_EMBEDDING_MODEL}
      device: ${HF_DEVICE}

  llm:
    llm_openai_base: &llm_openai
      provider: openai
      temperature: 0
      model: ${OPENAI_MODEL}

    llm_ollama_base: &llm_ollama
      provider: ollama
      host: ${OLLAMA_HOST}
      port: ${OLLAMA_PORT}
      ssl: ${OLLAMA_SSL}
      temperature: 0
      model: ${OLLAMA_MODEL}

  vectorstore:
    chroma_server_base: &chroma_server
      provider: "chroma"
      host: ${CHROMA_HOST}
      port: ${CHROMA_PORT}
      ssl: ${CHROMA_SSL}
      collection: ${VECTOR_COLLECTION}
    chroma_local_base: &chroma_local
      provider: "chroma"
      persist_path: ${PROJECT_ROOT}/data/chroma_db
      collection: ${VECTOR_COLLECTION}

  retriever:
    simple_base: &retriever_simple
      provider: simple
      top_k: 5

    mmr_base: &retriever_mmr
      provider: mmr
      top_k: 5
      fetch_k: 10

  persistence:
    database:
      sqlite_base: &sqlite_base
        provider: "sqlite"
        path: ${PROJECT_ROOT}/data
        database: ${PERSISTENCE_DB_NAME}

      postgresql_base: &postgresql_base
        provider: "postgresql"
        host: ${POSTGRES_HOST}
        port: ${POSTGRES_PORT}
        user: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        database: ${PERSISTENCE_DB_NAME}
        ssl: ${POSTGRES_SSL}

app:
  api_token: ${API_TOKEN}

  logging:
    enabled: true
    level: info
    rich_tracebacks: true
    show_time: false
    show_level: true
    show_path: true

  traceback:
    enabled: true
    show_locals: false

  output:
    graph_viz:
      auto_save: true
      file_path: ${PROJECT_ROOT}/logs/graph.png
    log_files:
      chat_bot_votes:
        enabled: true
        file_path: ${PROJECT_ROOT}/logs/chat_votes.jsonl

  observability:
    enabled: ${OBS_ENABLED}
    service:
      name: rag_app
      environment: ${APP_ENV}
    otel:
      endpoint: ${OBS_ENDPOINT}
      sample_rate: 1.0
      trace_batch_delay: 1000
      trace_batch_size: 512
      trace_export_timeout: 5000
      metrics_export_interval: 5000
      logs_batch_delay: 1000
    instrument_langchain:
      enabled: true
      capture_content: true

  rag:
    memory:
      small:
        window_size: 9
        human_only: true
      medium:
        window_size: 12
        human_only: false
      large:
        window_size: 15
        human_only: false

    embeddings:
      <<: ${EMBEDDING_PROVIDER}

    llm:
      heavy:
        <<: ${HEAVY_LLM_PROVIDER}
        temperature: 0

      fast:
        <<: ${FAST_LLM_PROVIDER}
        temperature: 0.7

    vectorstore:
      <<: ${VECTORSTORE_PROVIDER}

    retriever:
      <<: ${RETRIEVER_PROVIDER}

    persistence:
      database:
        <<: ${PERSISTENCE_DB_PROVIDER}

      encryption:
        provider: fernet
        key: ${ENCRYPTION_KEY}

      documents:
        history_size: 3

    reranker:
      provider: llm
      top_k: 5

    evaluation:
      test_file: ${PROJECT_ROOT}/data/tests.json

      judge_llm:
        <<: *llm_openai
        model: gpt-4o-mini
        temperature: 0.0

  orchestrator:
    strategy: ${RAG_ORCHESTRATOR}
