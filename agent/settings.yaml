providers:
  embeddings:
    embeddings_openai_base: &emb_openai
      provider: openai
      model: ${OPENAI_EMBEDDING_MODEL}

    embeddings_ollama_base: &emb_ollama
      provider: ollama
      model: ${OLLAMA_EMBEDDING_MODEL}

    huggingface: &emb_hf
      provider: huggingface
      model: ${HF_EMBEDDING_MODEL}
      device: ${HF_DEVICE}

  llm:
    llm_openai_base: &llm_openai
      provider: openai
      temperature: 0
      model: ${OPENAI_MODEL}

    llm_ollama_base: &llm_ollama
      provider: ollama
      host: ${OLLAMA_HOST}
      port: ${OLLAMA_PORT}
      ssl: ${OLLAMA_SSL}
      temperature: 0
      model: ${OLLAMA_MODEL}

  vectorstore:
    chroma_server_base: &chroma_server
      provider: "chroma"
      host: ${CHROMA_HOST}
      port: ${CHROMA_PORT}
      ssl: ${CHROMA_SSL}
      collection: ${VECTOR_COLLECTION}
    chroma_local_base: &chroma_local
      provider: "chroma"
      persist_path: ${PROJECT_ROOT}/data/chroma_db
      collection: ${VECTOR_COLLECTION}

app:
  logging:
    enabled: true
    level: info
    rich_tracebacks: true
    show_time: false
    show_level: true
    show_path: true

  traceback:
    enabled: true
    show_locals: false

  observability:
    enabled: ${OBS_ENABLED}
    service:
      name: rag_app
      environment: ${APP_ENV}
    otel:
      endpoint: ${OBS_ENDPOINT}
      sample_rate: 1.0
      trace_batch_delay: 1000
      trace_batch_size: 512
      trace_export_timeout: 5000
      metrics_export_interval: 5000
      logs_batch_delay: 1000
    instrument_langchain:
      enabled: true
      capture_content: true

  rag:
    embeddings:
      <<: ${EMBEDDING_PROVIDER}

    llm:
      heavy:
        <<: ${HEAVY_LLM_PROVIDER}
        temperature: 0

      fast:
        <<: ${FAST_LLM_PROVIDER}
        temperature: 0.7

    vectorstore:
      <<: ${VECTORSTORE_PROVIDER}
